<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog - Thar Oil Products | Tips, Recipes & More</title>
<meta name="description" content="Read our latest blogs about cold-pressed oils, cooking tips, health benefits and more from Thar Oil Products.">
<link rel="icon" type="image/png" href="img/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--gold:#C8921A;--gold2:#E4B84A;--dark:#090705;--dark2:#120E06;--dark3:#1A1209;--cream:#F0E4C8;--text:#B8A882;--red:#C0392B;--green:#27AE60;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;}
nav{position:fixed;top:0;width:100%;z-index:200;padding:1rem 4rem;display:flex;align-items:center;justify-content:space-between;background:rgba(9,7,5,.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(200,146,42,.1);}
.logo{display:flex;align-items:center;gap:.75rem;text-decoration:none;}
.logo-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;}
.logo-text{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:700;color:var(--cream);}
.logo-text span{display:block;font-family:'Outfit',sans-serif;font-size:.5rem;font-weight:600;color:var(--gold2);letter-spacing:.22em;text-transform:uppercase;}
.nav-right a{color:var(--text);text-decoration:none;font-size:.8rem;margin-left:1rem;transition:color .3s;}
.nav-right a:hover{color:var(--gold2);}
.hero{padding:9rem 4rem 5rem;text-align:center;background:linear-gradient(to bottom,var(--dark),var(--dark2));}
.hero-label{font-size:.68rem;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem;}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2.5rem,5vw,4rem);font-weight:700;color:var(--cream);margin-bottom:1rem;}
.hero-title em{color:var(--gold2);font-style:italic;}
.container{max-width:1100px;margin:0 auto;padding:4rem 2rem;}
.blog-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2rem;}
.blog-card{background:var(--dark2);border:1px solid rgba(200,146,42,.1);border-radius:12px;overflow:hidden;transition:all .4s;cursor:pointer;}
.blog-card:hover{transform:translateY(-8px);border-color:rgba(200,146,42,.35);box-shadow:0 20px 50px rgba(0,0,0,.4);}
.blog-img{height:200px;background:linear-gradient(135deg,var(--dark3),var(--dark2));overflow:hidden;display:flex;align-items:center;justify-content:center;position:relative;}
.blog-img img{width:100%;height:100%;object-fit:cover;transition:transform .5s;}
.blog-card:hover .blog-img img{transform:scale(1.06);}
.blog-img-placeholder{font-size:3.5rem;opacity:.3;}
.blog-body{padding:1.4rem;}
.blog-meta{display:flex;align-items:center;gap:.75rem;margin-bottom:.75rem;font-size:.72rem;}
.blog-date{color:rgba(200,146,42,.5);}
.blog-tag{background:rgba(200,146,42,.1);color:var(--gold2);padding:.18rem .6rem;border-radius:20px;font-size:.65rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;}
.blog-title{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:700;color:var(--cream);margin-bottom:.5rem;line-height:1.3;}
.blog-excerpt{font-size:.78rem;line-height:1.65;margin-bottom:1rem;}
.blog-read-more{font-size:.75rem;color:var(--gold2);text-decoration:none;font-weight:600;letter-spacing:.08em;display:inline-flex;align-items:center;gap:.3rem;transition:gap .3s;}
.blog-read-more:hover{gap:.6rem;}
/* Single blog view */
.blog-single{max-width:760px;margin:0 auto;}
.blog-single-hero{background:var(--dark2);border-radius:12px;overflow:hidden;margin-bottom:2rem;}
.blog-single-hero img{width:100%;max-height:420px;object-fit:cover;}
.blog-single-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,4vw,3rem);font-weight:700;color:var(--cream);line-height:1.15;margin-bottom:1rem;}
.blog-single-meta{display:flex;gap:1rem;font-size:.78rem;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid rgba(200,146,42,.1);}
.blog-content{font-size:.95rem;line-height:1.9;color:var(--text);}
.blog-content h1,.blog-content h2,.blog-content h3,.blog-content h4,.blog-content h5,.blog-content h6{font-family:'Cormorant Garamond',serif;color:var(--cream);margin:1.8rem 0 .75rem;}
.blog-content p{margin-bottom:1rem;}
.blog-content img{width:100%;border-radius:8px;margin:1rem 0;}
.back-btn{display:inline-flex;align-items:center;gap:.4rem;color:var(--text);text-decoration:none;font-size:.82rem;margin-bottom:2rem;transition:color .3s;}
.back-btn:hover{color:var(--gold2);}
.empty-blogs{text-align:center;padding:5rem 2rem;grid-column:1/-1;}
.empty-blogs-icon{font-size:4rem;margin-bottom:1rem;opacity:.4;}
@media(max-width:900px){.blog-grid{grid-template-columns:repeat(2,1fr);}nav{padding:1rem 1.5rem;}.hero{padding:7rem 1.5rem 3rem;}}
@media(max-width:600px){.blog-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<nav>
  <a class="logo" href="index.html">
    <div class="logo-icon">🫙</div>
    <div class="logo-text">Thar Oil<span>Products</span></div>
  </a>
  <div class="nav-right">
    <a href="index.html">Home</a>
    <a href="index.html#products">Products</a>
    <a href="cart.html">🛒 Cart</a>
    <a href="account.html">👤 Account</a>
  </div>
</nav>

<div id="pageContent">
  <div class="hero">
    <div class="hero-label">Knowledge Hub</div>
    <h1 class="hero-title">Our <em>Blog</em></h1>
    <p style="max-width:500px;margin:0 auto;font-size:.92rem;line-height:1.7">Tips, recipes, health benefits and stories from the world of cold-pressed oils.</p>
  </div>
  <div class="container">
    <div class="blog-grid" id="blogGrid"><div style="grid-column:1/-1;text-align:center;padding:3rem;opacity:.5">Loading blogs...</div></div>
  </div>
</div>

<script>
var currentSlug = new URLSearchParams(window.location.search).get('slug');

async function loadBlogs(){
  var blogs = [];
  try {
    var res = await fetch('/api/blogs');
    blogs = await res.json();
  } catch(e){
    blogs = JSON.parse(localStorage.getItem('thar_blogs')||'[]').filter(function(b){return b.status==='published';});
  }

  if(currentSlug){
    var blog = blogs.find(function(b){return b.slug===currentSlug;});
    if(blog){ renderSingleBlog(blog); return; }
  }
  renderBlogList(blogs);
}

function renderBlogList(blogs){
  var grid = document.getElementById('blogGrid');
  if(!blogs.length){
    grid.innerHTML='<div class="empty-blogs"><div class="empty-blogs-icon">📝</div><h3 style="color:var(--cream);font-family:Cormorant Garamond,serif;font-size:1.8rem;margin-bottom:.5rem">No blogs yet</h3><p>Check back soon for articles and tips!</p></div>';
    return;
  }
  grid.innerHTML = blogs.map(function(b){
    var date = new Date(b.published_at||b.created_at).toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});
    var excerpt = b.excerpt || (b.content ? b.content.replace(/<[^>]+>/g,'').substring(0,120)+'...' : '');
    return '<div class="blog-card" onclick="window.location.href=\'blogs.html?slug='+b.slug+'\'">'
      +'<div class="blog-img">'+(b.image?'<img src="'+b.image+'" alt="'+b.title+'">':'<div class="blog-img-placeholder">📝</div>')+'</div>'
      +'<div class="blog-body">'
        +'<div class="blog-meta"><span class="blog-date">'+date+'</span></div>'
        +'<h2 class="blog-title">'+b.title+'</h2>'
        +'<p class="blog-excerpt">'+excerpt+'</p>'
        +'<a class="blog-read-more" href="blogs.html?slug='+b.slug+'">Read More →</a>'
      +'</div>'
    +'</div>';
  }).join('');
}

function renderSingleBlog(b){
  var date = new Date(b.published_at||b.created_at).toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});
  document.getElementById('pageContent').innerHTML =
    '<div style="padding:7rem 2rem 4rem;max-width:800px;margin:0 auto">'
    +'<a class="back-btn" href="blogs.html">← Back to Blogs</a>'
    +(b.image?'<div class="blog-single-hero"><img src="'+b.image+'" alt="'+b.title+'"></div>':'')
    +'<h1 class="blog-single-title">'+b.title+'</h1>'
    +'<div class="blog-single-meta"><span>📅 '+date+'</span></div>'
    +'<div class="blog-content">'+( b.content||'' )+'</div>'
    +'</div>';
  document.title = b.title + ' - Thar Oil Blog';
  if(b.meta_description){ var m=document.createElement('meta'); m.name='description'; m.content=b.meta_description; document.head.appendChild(m); }
}

loadBlogs();
</script>
</body>
</html>
